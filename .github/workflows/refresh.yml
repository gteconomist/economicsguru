name: Refresh data and deploy

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # write so the housing fetch scripts can auto-append CSV baselines
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Each fetch step is `continue-on-error: true` so a single source going
      # down (e.g. BLS daily-quota exhausted, FRED 5xx storm, Census outage)
      # does not block the rest of the pipeline. Combined with the data/*.json
      # auto-commit at the end of the build job, a failed fetch just means
      # yesterday's committed JSON rides through to deploy -- the corresponding
      # page shows yesterday's numbers for one day instead of going blank.

      - name: Refresh CPI data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_inflation.py

      - name: Refresh PPI data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_ppi.py

      - name: Refresh labor market data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_labor.py

      - name: Refresh PCE data from BEA
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_pce.py

      - name: Refresh Existing Homes data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_housing_existing.py

      - name: Install xlrd (for NAHB Table 4 .xls parsing)
        run: pip install "xlrd==1.2.0"

      - name: Refresh New Homes data from Census + FRED + NAHB
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_housing_new.py

      - name: Refresh Permits & Starts data from FRED (Census-sourced)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_housing_permits.py

      - name: Refresh GDP data from BEA + BLS + FRED
        env:
          BEA_API_KEY:  ${{ secrets.BEA_API_KEY }}
          BLS_API_KEY:  ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_gdp.py

      - name: Refresh Consumer data from FRED + manual CSVs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_consumer.py

      - name: Refresh Treasuries / Rates data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_treasuries.py

      - name: Refresh Commodities data from Stooq + FRED + MetalPriceAPI
        env:
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_commodities.py

      - name: Refresh Equities data from Stooq + FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_equities.py

      # Show data summary, but don't fail the workflow if some files are missing
      # (a fetch step may have hit a quota or rate-limit). Each line is wrapped
      # so a missing/empty JSON prints a warning and we keep going.
      - name: Show generated data summary
        run: |
          set +e
          for f in inflation ppi labor pce housing_existing housing_new housing_permits gdp consumer treasuries commodities equities; do
            if [[ -s "data/${f}.json" ]]; then
              echo "OK  data/${f}.json ($(stat -c%s data/${f}.json) bytes)"
            else
              echo "WARN data/${f}.json missing or empty (fetch step likely failed; previous file retained)"
            fi
          done
          echo "---"
          python -c "import json; d=json.load(open('data/inflation.json')); print('CPI latest:', d['latest_label']); print('CPI headline kpi:', d['kpis']['headline'])" 2>/dev/null || echo "skip CPI summary"
          python -c "import json; d=json.load(open('data/ppi.json')); print('PPI latest:', d['latest_label']); print('PPI headline kpi:', d['kpis']['headline'])" 2>/dev/null || echo "skip PPI summary"
          python -c "import json; d=json.load(open('data/labor.json')); print('Labor CPS:', d['cps_latest'], 'JOLTS:', d['jolts_latest']); print('UR kpi:', d['kpis']['unemployment'])" 2>/dev/null || echo "skip labor summary"
          python -c "import json; d=json.load(open('data/pce.json')); print('PCE latest:', d['latest_label']); print('PCE headline kpi:', d['kpis']['headline']); print('PCE supercore kpi:', d['kpis']['supercore'])" 2>/dev/null || echo "skip PCE summary"
          python -c "import json; d=json.load(open('data/housing_existing.json')); print('Existing Homes latest:', d['latest_label']); print('Sales kpi:', d['kpis']['sales']); print('Mortgage kpi:', d['kpis']['mortgage_30y']); print('CSV baseline loaded:', d.get('csv_baseline_loaded')); print('CSV rows appended this run:', d.get('csv_rows_appended_this_run', 0))" 2>/dev/null || echo "skip existing-homes summary"
          python -c "import json; d=json.load(open('data/housing_new.json')); print('New Homes latest:', d['latest_label']); print('Sales kpi:', d['kpis']['sales']); print('NAHB kpi:', d['kpis']['nahb_hmi']); print('NAHB scrape ok:', d.get('nahb_scrape_succeeded')); print('NAHB CSV changed this run:', d.get('nahb_csv_changed_this_run'))" 2>/dev/null || echo "skip new-homes summary"
          python -c "import json; d=json.load(open('data/housing_permits.json')); print('Permits & Starts latest:', d['latest_label']); print('Total permits kpi:', d['kpis']['permits_total']); print('Total starts kpi:', d['kpis']['starts_total'])" 2>/dev/null || echo "skip permits summary"
          python -c "import json; d=json.load(open('data/gdp.json')); print('GDP latest:', d['latest_label']); print('GDP QoQ ann kpi:', d['kpis']['gdp_qoq_ann']); print('Productivity kpi:', d['kpis']['productivity'])" 2>/dev/null || echo "skip GDP summary"
          python -c "import json; d=json.load(open('data/consumer.json')); print('Consumer latest:', d['latest_label']); print('Retail MoM kpi:', d['kpis']['retail_mom']); print('PI MoM kpi:', d['kpis']['pi_mom']); print('UMich kpi:', d['kpis']['umich_sentiment']); print('CB CCI kpi:', d['kpis']['cb_confidence']); print('UMich components loaded:', d.get('umich_components_loaded')); print('CB CSV loaded:', d.get('cb_loaded'))" 2>/dev/null || echo "skip consumer summary"
          python -c "import json; d=json.load(open('data/treasuries.json')); print('Treasuries latest:', d['latest_label']); print('10Y kpi:', d['kpis']['y10y']); print('2s10s spread kpi:', d['kpis']['spread']); print('Fed Funds kpi:', d['kpis']['ffr']); print('Curve maturities:', [p['maturity'] for p in d['yield_curve_today']])" 2>/dev/null || echo "skip treasuries summary"
          python -c "import json; d=json.load(open('data/commodities.json')); print('Commodities latest:', d['latest_label']); print('Gold kpi:', d['kpis']['gold']); print('Silver kpi:', d['kpis']['silver']); print('Platinum kpi:', d['kpis']['platinum']); print('G/S ratio kpi:', d['kpis']['gs_ratio']); print('WTI kpi:', d['kpis']['wti']); print('CSV baseline loaded:', d.get('metals_csv_loaded')); print('MetalPriceAPI ok:', d.get('metalprice_succeeded'))" 2>/dev/null || echo "skip commodities summary"
          python -c "import json; d=json.load(open('data/equities.json')); print('Equities latest:', d['latest_label']); print('SPX kpi:', d['kpis']['spx']); print('Nasdaq kpi:', d['kpis']['nasdaq']); print('Dow kpi:', d['kpis']['dow']); print('Russell kpi:', d['kpis']['russell']); print('VIX kpi:', d['kpis']['vix']); print('SPX drawdown kpi:', d['kpis']['spx_drawdown']); pe=d.get('wilshire_pe', []); print('Wilshire/PE quarters:', len(pe)); print('Wilshire/PE latest:', pe[-1] if pe else None); print('Profits after tax (IVA+CCAdj) latest:', d.get('profits_after_tax', [None])[-1]); print('Stooq ok:', d.get('stooq_succeeded')); print('FRED ok:', d.get('fred_succeeded'))" 2>/dev/null || echo "skip equities summary"
          exit 0

      # Auto-commit fresh data files + CSV baselines if their content materially
      # changed (i.e. anything besides the build_time timestamp). This serves
      # two purposes:
      #  1. Yesterday's good JSONs persist in the repo, so when a fetch fails
      #     today (BLS quota etc.), checkout brings yesterday's file forward
      #     and the corresponding page renders yesterday's numbers instead of
      #     going blank.
      #  2. The historical CSV baselines (NAR existing-homes, NAHB HMI, UMich
      #     sentiment, Conference Board, precious metals) keep auto-extending.
      # The [skip ci] tag prevents the bot's commit from re-triggering this
      # workflow.
      - name: Commit fresh data files + CSV baselines (if changed)
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          changed=""

          # data/*.json -- only commit if content (excluding build_time) changed
          for f in data/*.json; do
            [[ -f "$f" ]] || continue
            [[ -n "$(git status --porcelain "$f")" ]] || continue
            prev_norm=$(git show "HEAD:$f" 2>/dev/null \
              | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); d.pop('build_time',None); print(json.dumps(d, sort_keys=True))" 2>/dev/null \
              || echo "__no_prior__")
            new_norm=$(python3 -c "import sys,json; d=json.loads(open('$f').read()); d.pop('build_time',None); print(json.dumps(d, sort_keys=True))" 2>/dev/null \
              || echo "__parse_fail__")
            if [[ "$prev_norm" != "$new_norm" ]]; then
              changed="$changed $f"
            fi
          done

          # CSV baselines -- commit on any change (they're append-only / hand-edited)
          for f in data/historical/nar_existing_homes.csv data/historical/nahb_hmi.csv data/historical/umich_sentiment.csv data/historical/conference_board.csv data/historical/precious_metals_kitco.csv; do
            if [[ -f "$f" && -n "$(git status --porcelain "$f")" ]]; then
              changed="$changed $f"
            fi
          done

          if [[ -n "$changed" ]]; then
            git add $changed
            git commit -m "data: refresh JSON snapshots + CSV baselines [skip ci]"
            git push
            echo "Committed:$changed"
          else
            echo "No material data changes to commit."
          fi

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Refresh data and deploy

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # write so the housing fetch scripts can auto-append CSV baselines
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh CPI data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python scripts/fetch_inflation.py

      - name: Refresh PPI data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python scripts/fetch_ppi.py

      - name: Refresh labor market data from BLS
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python scripts/fetch_labor.py

      - name: Refresh PCE data from BEA
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        run: python scripts/fetch_pce.py

      - name: Refresh Existing Homes data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_housing_existing.py

      - name: Install xlrd (for NAHB Table 4 .xls parsing)
        run: pip install "xlrd==1.2.0"

      - name: Refresh New Homes data from Census + FRED + NAHB
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_housing_new.py

      - name: Refresh Permits & Starts data from FRED (Census-sourced)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_housing_permits.py

      - name: Refresh GDP data from BEA + BLS + FRED
        env:
          BEA_API_KEY:  ${{ secrets.BEA_API_KEY }}
          BLS_API_KEY:  ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_gdp.py

      - name: Show generated data summary
        run: |
          test -s data/inflation.json
          test -s data/ppi.json
          test -s data/labor.json
          test -s data/pce.json
          test -s data/housing_existing.json
          test -s data/housing_new.json
          test -s data/housing_permits.json
          test -s data/gdp.json
          python -c "import json; d=json.load(open('data/inflation.json')); print('CPI latest:', d['latest_label']); print('CPI headline kpi:', d['kpis']['headline'])"
          python -c "import json; d=json.load(open('data/ppi.json')); print('PPI latest:', d['latest_label']); print('PPI headline kpi:', d['kpis']['headline'])"
          python -c "import json; d=json.load(open('data/labor.json')); print('Labor CPS:', d['cps_latest'], 'JOLTS:', d['jolts_latest']); print('UR kpi:', d['kpis']['unemployment'])"
          python -c "import json; d=json.load(open('data/pce.json')); print('PCE latest:', d['latest_label']); print('PCE headline kpi:', d['kpis']['headline']); print('PCE supercore kpi:', d['kpis']['supercore'])"
          python -c "import json; d=json.load(open('data/housing_existing.json')); print('Existing Homes latest:', d['latest_label']); print('Sales kpi:', d['kpis']['sales']); print('Mortgage kpi:', d['kpis']['mortgage_30y']); print('CSV baseline loaded:', d.get('csv_baseline_loaded')); print('CSV rows appended this run:', d.get('csv_rows_appended_this_run', 0))"
          python -c "import json; d=json.load(open('data/housing_new.json')); print('New Homes latest:', d['latest_label']); print('Sales kpi:', d['kpis']['sales']); print('NAHB kpi:', d['kpis']['nahb_hmi']); print('NAHB scrape ok:', d.get('nahb_scrape_succeeded')); print('NAHB CSV changed this run:', d.get('nahb_csv_changed_this_run'))"
          python -c "import json; d=json.load(open('data/housing_permits.json')); print('Permits & Starts latest:', d['latest_label']); print('Total permits kpi:', d['kpis']['permits_total']); print('Total starts kpi:', d['kpis']['starts_total'])"
          python -c "import json; d=json.load(open('data/gdp.json')); print('GDP latest:', d['latest_label']); print('GDP QoQ ann kpi:', d['kpis']['gdp_qoq_ann']); print('Productivity kpi:', d['kpis']['productivity'])"

      - name: Commit auto-appended CSV rows (if any)
        run: |
          changed=""
          for f in data/historical/nar_existing_homes.csv data/historical/nahb_hmi.csv; do
            if [[ -f "$f" && -n "$(git status --porcelain "$f")" ]]; then
              changed="$changed $f"
            fi
          done
          if [[ -n "$changed" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $changed
            git commit -m "data: auto-append latest months to CSV baselines [skip ci]"
            git push
            echo "Committed CSV updates:$changed"
          else
            echo "No CSV changes to commit."
          fi

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
